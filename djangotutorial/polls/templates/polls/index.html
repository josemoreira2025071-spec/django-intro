<!DOCTYPE html>
<html>
<head>
    <title>Polls</title>
</head>
<body>
    <h1>Latest Polls</h1>

    {% if latest_question_list %}
        <ul>
        {% for question in latest_question_list %}
            <li>
                {{ question.question_text }} 
                <small>({{ question.pub_date|date:"Y-m-d" }})</small>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No polls are available.</p>
    {% endif %}
</body>
</html>
